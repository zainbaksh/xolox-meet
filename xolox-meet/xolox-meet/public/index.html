<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xolox Meet</title>
  <script src="/socket.io/socket.io.js"></script>

  <!-- Google Fonts: Google Sans + Material Symbols Rounded -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Display:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --surface: #0a120a;
      --surface2: #111a11;
      --border: #1a2e1a;
      --accent: #22c55e;
      --accent2: #16a34a;
      --text: #fff;
      --muted: #6b7a6b;
      --red: #ef4444;
      --radius: 14px;

      /* Google Meet bottom bar tokens */
      --meet-bar-bg: #202124;
      --meet-btn-bg: #3c4043;
      --meet-btn-hover: #4a4d51;
      --meet-btn-off: #ea4335;
      --meet-btn-off-hover: #d93025;
      --meet-end-bg: #ea4335;
      --meet-end-hover: #d93025;
      --meet-icon: #e8eaed;
      --meet-bar-height: 80px;
    }

    body {
      font-family: 'Google Sans', ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded';
      font-weight: normal;
      font-style: normal;
      font-size: 22px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      user-select: none;
      pointer-events: none;
    }

    /* ── MESH ── */
    .mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(34,197,94,0.10) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 85% 85%, rgba(22,163,74,0.07) 0%, transparent 65%);
    }

    /* ══════════════════════════════
       HOME PAGE
    ══════════════════════════════ */
    #page-home {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 44px;
      border-bottom: 1px solid var(--border);
    }

    .logo { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.3px; font-family: 'Google Sans Display', 'Google Sans', sans-serif; }
    .logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .hero {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 24px;
    }

    .hero-inner { max-width: 520px; width: 100%; text-align: center; }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem); font-weight: 600;
      line-height: 1.15; letter-spacing: -1px; margin-bottom: 40px;
      font-family: 'Google Sans Display', 'Google Sans', sans-serif;
    }

    h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px; text-align: left;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover { border-color: rgba(34,197,94,0.4); transform: translateY(-2px); }
    .card h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 14px; }

    input[type="text"] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 14px; color: var(--text);
      font-family: inherit; font-size: 0.9rem; outline: none;
      transition: border-color 0.2s; margin-bottom: 8px; display: block;
    }

    input[type="text"]:focus { border-color: rgba(34,197,94,0.5); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px 16px; border-radius: 9px;
      font-family: inherit; font-size: 0.88rem; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.2s; margin-top: 4px;
    }

    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: rgba(34,197,94,0.4); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-inner > * { animation: fadeUp 0.5s ease both; }
    .hero-inner > *:nth-child(1) { animation-delay: 0.05s; }
    .hero-inner > *:nth-child(2) { animation-delay: 0.12s; }

    /* ══════════════════════════════
       MEETING PAGE
    ══════════════════════════════ */
    #page-meeting {
      display: none; position: fixed; inset: 0; z-index: 100;
      flex-direction: column; background: #000;
    }

    #page-meeting.active { display: flex; }

    /* ── Top info bar (slim, no controls) ── */
    .meeting-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: rgba(0,0,0,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
      height: 52px;
    }

    .meeting-bar .logo { font-size: 1rem; }

    .room-pill {
      font-size: 0.78rem; color: var(--muted); background: var(--surface);
      padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border);
      font-family: 'Google Sans', sans-serif;
    }

    /* Video grid */
    #video-grid {
      flex: 1; display: grid; gap: 8px; padding: 8px;
      align-content: center; justify-content: center;
      overflow: hidden;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      /* leave space for bottom bar */
      padding-bottom: calc(var(--meet-bar-height) + 8px);
    }

    .video-tile {
      position: relative; background: var(--surface);
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 16/9;
    }

    .video-tile video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .video-tile .name-tag {
      position: absolute; bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      font-size: 0.78rem; padding: 3px 10px; border-radius: 99px;
      font-weight: 500; font-family: 'Google Sans', sans-serif;
    }

    .video-tile .muted-icon {
      position: absolute; top: 10px; right: 10px;
      background: rgba(239,68,68,0.8); border-radius: 50%;
      width: 26px; height: 26px;
      display: none; align-items: center; justify-content: center;
    }
    .video-tile .muted-icon .material-symbols-rounded { font-size: 14px; color: #fff; }

    .video-tile.mic-off .muted-icon { display: flex; }

    .video-tile .avatar {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: var(--surface2); font-size: 2.5rem;
      font-weight: 600; color: var(--accent);
      font-family: 'Google Sans Display', 'Google Sans', sans-serif;
    }

    .video-tile.cam-off .avatar { display: flex; }
    .video-tile.cam-off video { opacity: 0; }

    /* Chat panel */
    #chat-panel {
      position: absolute; right: 0; top: 52px; bottom: var(--meet-bar-height);
      width: 300px; background: var(--surface);
      border-left: 1px solid var(--border);
      display: none; flex-direction: column; z-index: 10;
    }

    #chat-panel.open { display: flex; }

    .chat-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; font-weight: 600;
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'Google Sans', sans-serif;
    }

    .chat-close {
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }
    .chat-close:hover { color: var(--text); }
    .chat-close .material-symbols-rounded { font-size: 18px; }

    #chat-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .chat-msg { font-size: 0.83rem; line-height: 1.5; font-family: 'Google Sans', sans-serif; }
    .chat-msg .sender { font-weight: 600; color: var(--accent); margin-bottom: 2px; font-size: 0.78rem; }
    .chat-msg .text { color: rgba(255,255,255,0.85); }
    .chat-msg.system { text-align: center; color: var(--muted); font-size: 0.78rem; font-style: italic; }

    .chat-input-row {
      display: flex; gap: 6px; padding: 10px;
      border-top: 1px solid var(--border);
    }

    .chat-input-row input {
      flex: 1; margin-bottom: 0; font-size: 0.85rem; padding: 8px 12px;
    }

    .chat-send {
      width: 34px; height: 34px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-send .material-symbols-rounded { font-size: 18px; }

    /* Toast */
    .toast {
      position: fixed; bottom: calc(var(--meet-bar-height) + 16px); left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #3c4043; border: 1px solid rgba(255,255,255,0.12);
      color: #e8eaed; padding: 10px 18px; border-radius: 9px;
      font-size: 0.85rem; z-index: 9999;
      transition: transform 0.25s ease, opacity 0.25s ease;
      white-space: nowrap; font-family: 'Google Sans', sans-serif;
      opacity: 0; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Participant count badge */
    .peer-count {
      font-size: 0.75rem; background: rgba(34,197,94,0.15);
      color: var(--accent); border: 1px solid rgba(34,197,94,0.3);
      padding: 2px 8px; border-radius: 99px;
      font-family: 'Google Sans', sans-serif;
    }

    /* ══════════════════════════════════════════════════════
       GOOGLE MEET-STYLE BOTTOM CONTROL BAR
    ══════════════════════════════════════════════════════ */
    #meet-controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--meet-bar-height);
      background: var(--meet-bar-bg);
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 200;
      border-top: 1px solid rgba(255,255,255,0.07);
      gap: 16px;
    }

    #page-meeting.active ~ #meet-controls,
    #meet-controls.active { display: flex; }

    /* Left section: time + room code */
    .ctrl-left {
      display: flex; align-items: center; gap: 12px;
      min-width: 160px; flex: 0 0 auto;
    }

    .ctrl-time {
      font-size: 0.85rem; color: #e8eaed;
      font-family: 'Google Sans', sans-serif;
      font-weight: 400; letter-spacing: 0.2px;
      min-width: 42px;
    }

    .ctrl-divider {
      width: 1px; height: 20px; background: rgba(255,255,255,0.2);
    }

    .ctrl-room-code {
      font-size: 0.82rem; color: #9aa0a6;
      font-family: 'Google Sans', sans-serif;
      font-weight: 400; letter-spacing: 0.1px;
      max-width: 130px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    /* Center section: main controls */
    .ctrl-center {
      display: flex; align-items: center; gap: 8px;
      flex: 1; justify-content: center;
    }

    /* Right section: utility controls */
    .ctrl-right {
      display: flex; align-items: center; gap: 8px;
      min-width: 160px; flex: 0 0 auto; justify-content: flex-end;
    }

    /* ── Base control button ── */
    .ctrl-btn {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--meet-btn-bg);
      border: none; cursor: pointer;
      color: var(--meet-icon);
      transition: background 0.15s ease, transform 0.1s ease;
      outline: none;
      flex-shrink: 0;
    }

    .ctrl-btn:hover {
      background: var(--meet-btn-hover);
    }

    .ctrl-btn:active { transform: scale(0.94); }

    /* Tooltip */
    .ctrl-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%; transform: translateX(-50%);
      background: #3c4043;
      color: #e8eaed;
      font-family: 'Google Sans', sans-serif;
      font-size: 0.75rem;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 300;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .ctrl-btn:hover::after { opacity: 1; }

    /* OFF state (mic/cam muted) */
    .ctrl-btn.off {
      background: var(--meet-btn-off);
    }
    .ctrl-btn.off:hover {
      background: var(--meet-btn-off-hover);
    }

    /* Active/highlighted state (screen share on, chat open) */
    .ctrl-btn.on {
      background: #8ab4f8;
    }
    .ctrl-btn.on .material-symbols-rounded { color: #202124; }
    .ctrl-btn.on:hover { background: #93bbf9; }

    /* End call button — wider pill */
    .ctrl-btn-end {
      width: 72px; height: 48px;
      border-radius: 99px;
      background: var(--meet-end-bg);
    }
    .ctrl-btn-end:hover { background: var(--meet-end-hover); }
    .ctrl-btn-end .material-symbols-rounded { font-size: 22px; }

    /* Small secondary icon next to some buttons (dropdown arrow) */
    .ctrl-btn-group {
      display: flex; align-items: center; gap: 2px;
    }

    .ctrl-chevron {
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: transparent;
      border: none; cursor: pointer;
      color: #9aa0a6;
      margin-left: -4px;
      transition: color 0.15s;
    }
    .ctrl-chevron:hover { color: #e8eaed; }
    .ctrl-chevron .material-symbols-rounded { font-size: 14px; }

    /* Separator line between center and right sections */
    .ctrl-section-divider {
      width: 1px; height: 32px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    /* Unread chat badge */
    .chat-badge {
      position: absolute; top: 6px; right: 6px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); display: none;
    }
    .chat-badge.visible { display: block; }

    @media (max-width: 480px) {
      nav { padding: 16px 20px; }
      .cards { grid-template-columns: 1fr; }
      .ctrl-left, .ctrl-right { min-width: 0; }
      .ctrl-left { display: none; }
      #meet-controls { padding: 0 12px; gap: 6px; }
      .ctrl-btn { width: 44px; height: 44px; }
      .ctrl-btn-end { width: 60px; height: 44px; }
    }
  </style>
</head>
<body>

<div class="mesh"></div>

<!-- ══ HOME PAGE ══ -->
<div id="page-home">
  <nav>
    <div class="logo">Xolox <span>Meet</span></div>
  </nav>
  <div class="hero">
    <div class="hero-inner">
      <h1>Meet anyone,<br/><em>anywhere.</em></h1>
      <div class="cards">
        <div class="card">
          <h3>New Meeting</h3>
          <input type="text" id="name-new" placeholder="Your name"/>
          <button class="btn btn-primary" onclick="startNew()">Start Meeting</button>
        </div>
        <div class="card">
          <h3>Join Meeting</h3>
          <input type="text" id="room-join" placeholder="Meeting ID"/>
          <input type="text" id="name-join" placeholder="Your name"/>
          <button class="btn btn-ghost" onclick="joinRoom()">Join →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MEETING PAGE ══ -->
<div id="page-meeting">
  <!-- Slim top bar: logo + room info only -->
  <div class="meeting-bar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo">Xolox <span>Meet</span></div>
    </div>
  </div>

  <div style="position:relative;flex:1;display:flex;overflow:hidden">
    <div id="video-grid"></div>
    <div id="chat-panel">
      <div class="chat-header">
        In-call messages
        <span class="chat-close" onclick="toggleChat()">
          <span class="material-symbols-rounded">close</span>
        </span>
      </div>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Send a message…" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="chat-send" onclick="sendChat()">
          <span class="material-symbols-rounded">send</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══ GOOGLE MEET-STYLE BOTTOM CONTROL BAR ══ -->
<div id="meet-controls">
  <!-- Left: clock + room code -->
  <div class="ctrl-left">
    <span class="ctrl-time" id="ctrl-clock">--:--</span>
    <div class="ctrl-divider"></div>
    <span class="ctrl-room-code" id="ctrl-room-display">—</span>
  </div>

  <!-- Center: main call controls -->
  <div class="ctrl-center">
    <!-- Microphone -->
    <div class="ctrl-btn-group">
      <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()" data-tooltip="Turn off mic (M)">
        <span class="material-symbols-rounded" id="icon-mic">mic</span>
      </button>
    </div>

    <!-- Camera -->
    <div class="ctrl-btn-group">
      <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()" data-tooltip="Turn off camera (V)">
        <span class="material-symbols-rounded" id="icon-cam">videocam</span>
      </button>
    </div>

    <!-- Closed Captions (decorative) -->
    <button class="ctrl-btn" data-tooltip="Turn on captions (C)" onclick="showToast('Captions coming soon')">
      <span class="material-symbols-rounded">closed_caption</span>
    </button>

    <!-- Present / Screen Share -->
    <button class="ctrl-btn" id="btn-screen" onclick="toggleScreen()" data-tooltip="Present now">
      <span class="material-symbols-rounded" id="icon-screen">present_to_all</span>
    </button>

    <!-- Raise Hand (decorative) -->
    <button class="ctrl-btn" id="btn-hand" data-tooltip="Raise your hand" onclick="toggleHand()">
      <span class="material-symbols-rounded" id="icon-hand">back_hand</span>
    </button>

    <!-- Reactions (decorative) -->
    <button class="ctrl-btn" data-tooltip="Send a reaction" onclick="showToast('Reactions coming soon')">
      <span class="material-symbols-rounded">sentiment_satisfied</span>
    </button>

    <!-- More options -->
    <button class="ctrl-btn" data-tooltip="More options" onclick="showToast('More options coming soon')">
      <span class="material-symbols-rounded">more_vert</span>
    </button>
  </div>

  <!-- Right: utility + end call -->
  <div class="ctrl-right">
    <!-- People / participants -->
    <button class="ctrl-btn" data-tooltip="People" onclick="showToast('Participants panel coming soon')">
      <span class="material-symbols-rounded">group</span>
    </button>

    <!-- Chat -->
    <button class="ctrl-btn" id="btn-chat" onclick="toggleChat()" data-tooltip="Chat with everyone">
      <span class="material-symbols-rounded">chat_bubble</span>
      <span class="chat-badge" id="chat-badge"></span>
    </button>

    <!-- Copy invite link -->
    <button class="ctrl-btn" onclick="copyLink()" data-tooltip="Copy invite link">
      <span class="material-symbols-rounded">link</span>
    </button>

    <div class="ctrl-section-divider"></div>

    <!-- End call -->
    <button class="ctrl-btn ctrl-btn-end" onclick="leaveMeeting()" data-tooltip="Leave call">
      <span class="material-symbols-rounded">call_end</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let socket, localStream, screenStream;
let myName = 'Guest', myRoom = '';
let peers = {};
let micOn = true, camOn = true, screenOn = false, handRaised = false;

const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun3.l.google.com:19302' },
    // Primary TURN - openrelay (UDP + TCP + TLS)
    {
      urls: [
        'turn:openrelay.metered.ca:80',
        'turn:openrelay.metered.ca:80?transport=tcp',
        'turn:openrelay.metered.ca:443',
        'turn:openrelay.metered.ca:443?transport=tcp',
        'turns:openrelay.metered.ca:443',
      ],
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    // Backup TURN - freestun
    {
      urls: [
        'turn:freestun.net:3478',
        'turns:freestun.net:5349',
      ],
      username: 'free',
      credential: 'free'
    }
  ],
  iceCandidatePoolSize: 10,
  bundlePolicy: 'max-bundle',
  rtcpMuxPolicy: 'require'
};

// ════════════════════════════════════════
// CLOCK
// ════════════════════════════════════════
function startClock() {
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('ctrl-clock').textContent = `${h}:${m}`;
  }
  tick();
  setInterval(tick, 10000);
}

// ════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function generateRoomId() {
  const w = ['swift','lunar','nova','echo','zeta','orbit','pulse','forge','nexus','vega'];
  const p = () => w[Math.floor(Math.random() * w.length)];
  return `${p()}-${p()}-${Math.floor(1000 + Math.random() * 9000)}`;
}

function updatePeerCount() {
  // peer count badge removed from top bar
}

// ════════════════════════════════════════
// HOME ACTIONS
// ════════════════════════════════════════
function startNew() {
  const name = document.getElementById('name-new').value.trim() || 'Guest';
  const room = generateRoomId();
  enterMeeting(room, name);
}

function joinRoom() {
  let room = document.getElementById('room-join').value.trim();
  const name = document.getElementById('name-join').value.trim() || 'Guest';
  if (!room) { showToast('Enter a meeting ID'); return; }
  enterMeeting(room, name);
}

// ════════════════════════════════════════
// ENTER MEETING
// ════════════════════════════════════════
async function enterMeeting(roomId, name) {
  myName = name;
  myRoom = roomId;

  document.getElementById('page-home').style.display = 'none';
  document.getElementById('page-meeting').classList.add('active');
  document.getElementById('meet-controls').classList.add('active');
  // room label removed from top bar
  document.getElementById('ctrl-room-display').textContent = roomId;

  startClock();

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
      showToast('Camera not available — audio only');
    } catch (e2) {
      localStream = new MediaStream();
      showToast('No camera or mic found');
    }
  }

  addVideoTile('local', localStream, myName, true);
  updatePeerCount();

  socket = io();
  setupSocketEvents();
  socket.emit('join-room', { roomId, userName: name });

  history.pushState({}, '', `?room=${roomId}`);
}

// ════════════════════════════════════════
// VIDEO TILES
// ════════════════════════════════════════
function addVideoTile(id, stream, name, isLocal) {
  const grid = document.getElementById('video-grid');
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = `tile-${id}`;

  const initial = (name || 'G')[0].toUpperCase();

  tile.innerHTML = `
    <video autoplay playsinline ${isLocal ? 'muted' : ''}></video>
    <div class="avatar">${initial}</div>
    <div class="name-tag">${name}${isLocal ? ' (You)' : ''}</div>
    <div class="muted-icon"><span class="material-symbols-rounded">mic_off</span></div>
  `;

  const video = tile.querySelector('video');
  video.srcObject = stream;
  video.play().catch(() => {
    const unlock = () => { video.play(); document.removeEventListener('click', unlock); };
    document.addEventListener('click', unlock);
  });
  grid.appendChild(tile);
}

function removeTile(id) {
  document.getElementById(`tile-${id}`)?.remove();
}

// ════════════════════════════════════════
// SOCKET SIGNALING
// ════════════════════════════════════════
function setupSocketEvents() {
  socket.on('existing-peers', async (peerList) => {
    for (const { peerId, userName } of peerList) {
      await createPeerConnection(peerId, userName, true);
    }
  });

  socket.on('peer-joined', async ({ peerId, userName }) => {
    addChatMsg(null, `${userName} joined`, true);
    await createPeerConnection(peerId, userName, false);
  });

  socket.on('offer', async ({ from, offer }) => {
    const pc = peers[from]?.pc;
    if (!pc) return;
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer', { to: from, answer });
  });

  socket.on('answer', async ({ from, answer }) => {
    await peers[from]?.pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('ice-candidate', async ({ from, candidate }) => {
    try {
      await peers[from]?.pc.addIceCandidate(new RTCIceCandidate(candidate));
    } catch (e) {}
  });

  socket.on('peer-left', ({ peerId, userName }) => {
    addChatMsg(null, `${userName} left`, true);
    peers[peerId]?.pc.close();
    delete peers[peerId];
    removeTile(peerId);
    updatePeerCount();
  });

  socket.on('chat-message', ({ name, text }) => {
    addChatMsg(name, text, false);
  });
}

// ════════════════════════════════════════
// WEBRTC PEER CONNECTION
// ════════════════════════════════════════
async function createPeerConnection(peerId, peerName, shouldOffer) {
  const pc = new RTCPeerConnection(ICE_SERVERS);
  const remoteStream = new MediaStream();

  peers[peerId] = { pc, stream: remoteStream, name: peerName };
  addVideoTile(peerId, remoteStream, peerName, false);
  updatePeerCount();

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (e) => {
    const track = e.track;
    remoteStream.addTrack(track);

    // Update the video element srcObject so new tracks are picked up live
    const tile = document.getElementById(`tile-${peerId}`);
    if (tile) {
      const video = tile.querySelector('video');
      if (video.srcObject !== remoteStream) video.srcObject = remoteStream;
      video.play().catch(() => {
        const unlock = () => { video.play(); document.removeEventListener('click', unlock); };
        document.addEventListener('click', unlock);
      });
    }
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('ice-candidate', { to: peerId, candidate: e.candidate });
    }
  };

  pc.onconnectionstatechange = () => {
    console.log(`[${peerId}] connection state:`, pc.connectionState);
    if (pc.connectionState === 'failed') {
      console.warn(`[${peerId}] Connection failed, restarting ICE...`);
      pc.restartIce();
    }
    if (pc.connectionState === 'disconnected') {
      // Give it 5s to recover before restarting
      setTimeout(() => {
        if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
          pc.restartIce();
        }
      }, 5000);
    }
  };

  pc.oniceconnectionstatechange = () => {
    console.log(`[${peerId}] ICE state:`, pc.iceConnectionState);
  };

  if (shouldOffer) {
    const offer = await pc.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: true
    });
    await pc.setLocalDescription(offer);
    socket.emit('offer', { to: peerId, offer });
  }

  return pc;
}

// ════════════════════════════════════════
// CONTROLS
// ════════════════════════════════════════
function toggleMic() {
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  const btn = document.getElementById('btn-mic');
  const icon = document.getElementById('icon-mic');
  btn.classList.toggle('off', !micOn);
  btn.dataset.tooltip = micOn ? 'Turn off mic (M)' : 'Turn on mic (M)';
  icon.textContent = micOn ? 'mic' : 'mic_off';
  document.getElementById('tile-local')?.classList.toggle('mic-off', !micOn);
}

function toggleCam() {
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  const btn = document.getElementById('btn-cam');
  const icon = document.getElementById('icon-cam');
  btn.classList.toggle('off', !camOn);
  btn.dataset.tooltip = camOn ? 'Turn off camera (V)' : 'Turn on camera (V)';
  icon.textContent = camOn ? 'videocam' : 'videocam_off';
  document.getElementById('tile-local')?.classList.toggle('cam-off', !camOn);
}

async function toggleScreen() {
  if (!screenOn) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      const screenTrack = screenStream.getVideoTracks()[0];

      Object.values(peers).forEach(({ pc }) => {
        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender) sender.replaceTrack(screenTrack);
      });

      const localVideo = document.querySelector('#tile-local video');
      if (localVideo) localVideo.srcObject = screenStream;

      screenTrack.onended = () => { screenOn = true; toggleScreen(); };
      screenOn = true;
      const btn = document.getElementById('btn-screen');
      btn.classList.add('on');
      btn.dataset.tooltip = 'Stop presenting';
      document.getElementById('icon-screen').textContent = 'cancel_presentation';
      showToast('Screen sharing started');
    } catch (e) {
      showToast('Screen share cancelled');
    }
  } else {
    const camTrack = localStream.getVideoTracks()[0];
    Object.values(peers).forEach(({ pc }) => {
      const sender = pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender && camTrack) sender.replaceTrack(camTrack);
    });

    const localVideo = document.querySelector('#tile-local video');
    if (localVideo) localVideo.srcObject = localStream;

    screenStream?.getTracks().forEach(t => t.stop());
    screenOn = false;
    const btn = document.getElementById('btn-screen');
    btn.classList.remove('on');
    btn.dataset.tooltip = 'Present now';
    document.getElementById('icon-screen').textContent = 'present_to_all';
    showToast('Screen sharing stopped');
  }
}

function toggleHand() {
  handRaised = !handRaised;
  const btn = document.getElementById('btn-hand');
  const icon = document.getElementById('icon-hand');
  btn.classList.toggle('on', handRaised);
  icon.textContent = handRaised ? 'back_hand' : 'back_hand';
  btn.dataset.tooltip = handRaised ? 'Lower your hand' : 'Raise your hand';
  showToast(handRaised ? 'Hand raised' : 'Hand lowered');
}

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  const btn = document.getElementById('btn-chat');
  panel.classList.toggle('open');
  btn.classList.toggle('on', panel.classList.contains('open'));
  btn.dataset.tooltip = panel.classList.contains('open') ? 'Close chat' : 'Chat with everyone';
  // Clear badge when chat opened
  if (panel.classList.contains('open')) {
    document.getElementById('chat-badge').classList.remove('visible');
  }
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('chat-message', { roomId: myRoom, name: myName, text });
  addChatMsg(myName, text, false, true);
  input.value = '';
}

function addChatMsg(name, text, isSystem, isSelf) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  if (isSystem) {
    div.className = 'chat-msg system';
    div.textContent = text;
  } else {
    div.className = 'chat-msg';
    div.innerHTML = `<div class="sender">${isSelf ? 'You' : name}</div><div class="text">${text}</div>`;
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;

  if (!isSelf && !document.getElementById('chat-panel').classList.contains('open')) {
    document.getElementById('chat-badge').classList.add('visible');
  }
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => showToast('Invite link copied!'));
}

function leaveMeeting() {
  Object.values(peers).forEach(({ pc }) => pc.close());
  peers = {};
  localStream?.getTracks().forEach(t => t.stop());
  screenStream?.getTracks().forEach(t => t.stop());
  socket?.disconnect();
  document.getElementById('page-meeting').classList.remove('active');
  document.getElementById('meet-controls').classList.remove('active');
  document.getElementById('page-home').style.display = 'flex';
  document.getElementById('video-grid').innerHTML = '';
  document.getElementById('chat-messages').innerHTML = '';
  history.pushState({}, '', window.location.pathname);
  showToast('You left the meeting');
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('page-meeting').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'm' || e.key === 'M') toggleMic();
  if (e.key === 'v' || e.key === 'V') toggleCam();
});

// Auto-join from URL
window.addEventListener('DOMContentLoaded', () => {
  const room = new URLSearchParams(window.location.search).get('room');
  if (room) document.getElementById('room-join').value = room;
});
